stages:
  - lint
  - security
  - test

lint:
  stage: lint
  image: python:3.10
  script:
    - pip install ruff mypy
    - ruff check .
    - mypy app.py --ignore-missing-imports
  allow_failure: false

dead-code:
  stage: lint
  image: python:3.10
  script:
    - pip install vulture
    - vulture app.py --min-confidence 70
  allow_failure: true

secret-scan:
  stage: security
  image: python:3.10
  script:
    - pip install detect-secrets
    - detect-secrets scan > .secrets.baseline
  allow_failure: false

dependency-audit:
  stage: security
  image: python:3.10
  script:
    - pip install pip-audit
    - pip-audit -r requirements.txt
  allow_failure: false

unit-tests:
  stage: test
  image: python:3.10
  script:
    - pip install pytest pytest-cov streamlit groq requests
    - pytest tests/ -v
  allow_failure: false
